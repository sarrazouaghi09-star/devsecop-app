name: DevSecOps CI pipeline
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: checkout Code
      users: actions/checkout@v3
    - name: Build Docker Image
      run: docker build -t devsecops-app .
    - name: Run Container Test
      run: docker run -d -p 5000:5000 devsecops-app
    - name: Install Trivy
      run: |
        sudo apt-get update
        sudo apt-get install -y wget
        wget https://github.com/aquasecurity/trivy/releases/latest/download/trivy_0.50.2_Linux-64bit.deb
        sudo dpkg -i trivy_0.50.2_Linux-64bit.deb
    - name: Scan Docker Image
      run: Trivy image devesecop-app
