<!DOCTYPE html>
<html lang="en">

<head>

<title>Tunisair Operations Login</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
crossorigin="anonymous">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
integrity="sha384-/o6I2CkkWC//PSjvWC/eYN7l3xM3tJm8ZzVkCOfp//W05QcE3mlGskpoHB6XqI+B"
crossorigin="anonymous">

<style>

body{

height:100vh;
margin:0;

display:flex;
align-items:center;
justify-content:center;

background-image:url("https://images.unsplash.com/photo-1436491865332-7a61a109cc05");

background-size:cover;
background-position:center;

font-family:Arial, Helvetica, sans-serif;

}

.overlay{

position:absolute;
top:0;
left:0;

width:100%;
height:100%;

background:linear-gradient(
135deg,
rgba(217,4,41,0.85),
rgba(255,80,80,0.75)
);

}

.login-card{

position:relative;

background:white;

width:400px;

padding:40px;

border-radius:12px;

box-shadow:0 15px 40px rgba(0,0,0,0.25);

z-index:2;

}

.logo{

height:60px;
margin-bottom:20px;

}

.input-group-text{

background:white;
border-right:none;

}

.form-control{

border-left:none;

}

.btn-login{

background:#d90429;
color:#fff;

font-weight:bold;

}

.btn-login:hover{

background:#b80322;
color:#d1d5db;

}

.btn-login:focus,
.btn-login:active{

background:#b80322 !important;
color:#d1d5db !important;
box-shadow:none !important;

}

.small-text{
font-size:13px;
color:#666;
font-weight:400;
}

.login-card .alert{
font-weight:400;
}

</style>

</head>

<body>

<div class="overlay"></div>

<div class="login-card text-center">

<img src="/static/tunisair.png" class="logo">

<h4 class="mb-4"><b>Login</b></h4>

{% if login_error %}
<div class="alert alert-danger text-start" role="alert">
{{ login_error }}
</div>
{% endif %}

<form method="POST">
<input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

<div class="input-group mb-3">

<span class="input-group-text">

<i class="fa fa-user"></i>

</span>

<input type="text"
name="username"
class="form-control"
placeholder="Username"
required>

</div>


<div class="input-group mb-4">

<span class="input-group-text">

<i class="fa fa-lock"></i>

</span>

<input type="password"
name="password"
class="form-control"
placeholder="Password"
required>

</div>


<button class="btn btn-login w-100">

Login

</button>

</form>

<p class="mt-3 small-text">

Authorized airline staff only

</p>

</div>

</body>

</html>
